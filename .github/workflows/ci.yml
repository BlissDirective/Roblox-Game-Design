name: CI

# Lint + format check + Rojo build on every PR and push to main.
# Catches "this won't even compile in Studio" before it reaches a human reviewer.

# Skips on doc-only PRs — CI here lints/builds the Luau project, not the
# markdown. Doc references are validated by docs-check.yml.
#
# Note: this workflow file itself is intentionally NOT in the paths filter.
# Until Phase A1 lands src/, there is nothing for the workflow to lint or
# build, so a self-trigger on workflow edits would just produce a guaranteed
# failure. Once src/ exists, edits to ci.yml will be exercised by any
# subsequent source-touching PR.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "assets/**"
      - "default.project.json"
      - "raid.project.json"
      - "wally.toml"
      - "wally.lock"
      - "selene.toml"
      - "stylua.toml"
      - "aftman.toml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "assets/**"
      - "default.project.json"
      - "raid.project.json"
      - "wally.toml"
      - "wally.lock"
      - "selene.toml"
      - "stylua.toml"
      - "aftman.toml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, format, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Aftman toolchain
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          version: "v0.3.0"

      - name: Cache Wally packages
        uses: actions/cache@v4
        with:
          path: |
            Packages
            ServerPackages
            DevPackages
          key: ${{ runner.os }}-wally-${{ hashFiles('wally.lock', 'wally.toml') }}
          restore-keys: |
            ${{ runner.os }}-wally-

      - name: Install Wally packages
        run: wally install

      - name: Ensure package realm dirs exist
        # Wally only creates a packages dir for realms with declared deps.
        # default.project.json maps all three Packages paths into the tree,
        # so empty realms (no shared deps yet, no dev deps yet) need empty
        # placeholder folders or `rojo build` errors with "$path could not be
        # turned into a Roblox Instance".
        run: mkdir -p Packages ServerPackages DevPackages

      - name: Lint (Selene)
        # --allow-warnings honors selene.toml's severity design: only
        # `unscoped_variables` is `deny` (fatal); shadowing / multiple_statements
        # / deprecated are advisory `warn`. Without this flag selene exits
        # non-zero on any warning, making the advisory lints fatal — which
        # contradicts the config and is why CI failed on the first run that
        # actually reached the lint (the prior [config] mis-placement had been
        # aborting selene at config-parse before it linted anything).
        run: selene --allow-warnings src/ tests/

      - name: Format check (StyLua)
        run: stylua --check src/ tests/

      - name: Build main place (Rojo)
        run: |
          mkdir -p build
          rojo build default.project.json --output build/Game.rbxl

      - name: Build raid place (Rojo)
        # Per ADR-009, V1 ships a true two-PlaceId split. Building both
        # `.rbxl` files in CI catches `raid.project.json` schema drift on
        # every PR — same coverage as `default.project.json`.
        run: |
          rojo build raid.project.json --output build/Raid.rbxl

      - name: Upload main build artifact
        uses: actions/upload-artifact@v7
        with:
          name: Game.rbxl
          path: build/Game.rbxl
          retention-days: 7

      - name: Upload raid build artifact
        uses: actions/upload-artifact@v7
        with:
          name: Raid.rbxl
          path: build/Raid.rbxl
          retention-days: 7
